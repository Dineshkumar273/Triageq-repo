services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    expose:
      - "5000"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/certbot-www:/var/www/certbot
      - ./deploy/generated/ip-https.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped
